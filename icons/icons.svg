<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Hamburger menu -->
  <symbol id="icon-menu" viewBox="0 0 24 24" fill="none">
    <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Close X -->
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none">
    <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </symbol>

  <!-- Arrow left -->
  <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none">
    <polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Arrow right -->
  <symbol id="icon-arrow-right" viewBox="0 0 24 24" fill="none">
    <polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Phone -->
  <symbol id="icon-phone" viewBox="0 0 24 24" fill="none">
    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 10.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- Location pin -->
  <symbol id="icon-location" viewBox="0 0 24 24" fill="none">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- Facebook -->
  <symbol id="icon-facebook" viewBox="0 0 24 24" fill="currentColor">
    <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
  </symbol>

  <!-- Instagram -->
  <symbol id="icon-instagram" viewBox="0 0 24 24" fill="none">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="currentColor" stroke-width="2"/>
    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
    <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
  </symbol>

  <!-- X / Twitter -->
  <symbol id="icon-x" viewBox="0 0 24 24" fill="currentColor">
    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
  </symbol>

  <!-- Flower / logo leaf -->
  <symbol id="icon-flower" viewBox="0 0 24 24" fill="none">
    <path d="M12 2C12 2 8 6 8 10C8 12.21 9.79 14 12 14C14.21 14 16 12.21 16 10C16 6 12 2 12 2Z" fill="#E75B3A" opacity="0.8"/>
    <path d="M12 22C12 22 8 18 8 14C8 11.79 9.79 10 12 10C14.21 10 16 11.79 16 14C16 18 12 22 12 22Z" fill="#4CAF50" opacity="0.8"/>
    <path d="M2 12C2 12 6 8 10 8C12.21 8 14 9.79 14 12C14 14.21 12.21 16 10 16C6 16 2 12 2 12Z" fill="#4CAF50" opacity="0.6"/>
    <path d="M22 12C22 12 18 8 14 8C11.79 8 10 9.79 10 12C10 14.21 11.79 16 14 16C18 16 22 12 22 12Z" fill="#E75B3A" opacity="0.6"/>
